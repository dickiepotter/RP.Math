name: CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  # Prove the core library + tests build and pass on Linux (validates the
  # cross-platform net8.0 / netstandard2.0 targets).
  library:
    name: Library + tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore RP.Math.Vector3.Tests/RP.Math.Tests.csproj

      - name: Build (Release)
        run: dotnet build RP.Math.Vector3.Tests/RP.Math.Tests.csproj -c Release --no-restore

      - name: Test
        run: dotnet test RP.Math.Vector3.Tests/RP.Math.Tests.csproj -c Release --no-build --verbosity normal

  # Build the whole solution, including the Windows-only WinForms / Direct3D demos.
  solution:
    name: Full solution (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore RP.Math.Vector3.sln

      - name: Build (Release)
        run: dotnet build RP.Math.Vector3.sln -c Release --no-restore

      - name: Pack libraries
        run: |
          dotnet pack RP.Math/RP.Math.csproj -c Release --no-build -o artifacts
          dotnet pack RP.Math.Vector3/RP.Math.Vector3.csproj -c Release --no-build -o artifacts

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: artifacts/*.nupkg
