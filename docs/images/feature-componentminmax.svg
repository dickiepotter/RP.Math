<svg xmlns="http://www.w3.org/2000/svg" width="500" height="300" viewBox="0 0 500 300" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0.5" y="0.5" width="499" height="299" rx="12" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="20" y="30" font-size="16" font-weight="600" fill="#24292f">Component-wise min / max = bounding-box corners</text>

  <!-- axis hint -->
  <line x1="40" y1="250" x2="86" y2="250" stroke="#8c959f" stroke-width="1.5"/><path d="M86,247 L92,250 L86,253 z" fill="#8c959f"/><text x="95" y="254" font-size="12" fill="#8c959f">x</text>
  <line x1="40" y1="250" x2="40" y2="206" stroke="#8c959f" stroke-width="1.5"/><path d="M37,206 L40,200 L43,206 z" fill="#8c959f"/><text x="30" y="200" font-size="12" fill="#8c959f">y</text>

  <!-- bounding box of A and B -->
  <rect x="170" y="95" width="150" height="110" fill="none" stroke="#57606a" stroke-width="1.6" stroke-dasharray="6 4"/>

  <!-- the two input points (opposite corners so neither is wholly min nor max) -->
  <circle cx="170" cy="95" r="5.5" fill="#1f6feb"/>
  <text x="150" y="88" font-size="14" fill="#1f6feb" font-weight="600">A</text>
  <circle cx="320" cy="205" r="5.5" fill="#8250df"/>
  <text x="328" y="216" font-size="14" fill="#8250df" font-weight="600">B</text>

  <!-- ComponentMax = (max x, max y) : top-right corner -->
  <circle cx="320" cy="95" r="6" fill="#1a7f37"/>
  <text x="330" y="92" font-size="13" fill="#1a7f37" font-weight="600">ComponentMax</text>
  <text x="330" y="108" font-size="12" fill="#57606a">(max x, max y)</text>

  <!-- ComponentMin = (min x, min y) : bottom-left corner -->
  <circle cx="170" cy="205" r="6" fill="#1a7f37"/>
  <line x1="120" y1="232" x2="164" y2="208" stroke="#57606a" stroke-width="1"/>
  <text x="34" y="224" font-size="13" fill="#1a7f37" font-weight="600">ComponentMin</text>
  <text x="50" y="240" font-size="12" fill="#57606a">(min x, min y)</text>

  <text x="20" y="280" font-size="13" fill="#24292f">Each axis is taken independently &#8212; the result corners bound A and B.</text>
</svg>
