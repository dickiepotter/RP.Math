<svg xmlns="http://www.w3.org/2000/svg" width="500" height="300" viewBox="0 0 500 300" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="s-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1f6feb"/></marker>
    <marker id="s-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#8250df"/></marker>
  </defs>
  <rect x="0.5" y="0.5" width="499" height="299" rx="12" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="20" y="30" font-size="16" font-weight="600" fill="#24292f">Slerp follows the arc; Lerp cuts the chord</text>

  <!-- origin -->
  <circle cx="110" cy="240" r="3.5" fill="#24292f"/>
  <text x="86" y="258" font-size="12" fill="#24292f">origin</text>

  <!-- the arc of constant radius from A to B -->
  <path d="M 290 240 A 180 180 0 0 0 158 118" fill="none" stroke="#1a7f37" stroke-width="2.5"/>

  <!-- A and B vectors -->
  <line x1="110" y1="240" x2="290" y2="240" stroke="#1f6feb" stroke-width="3" marker-end="url(#s-blue)"/>
  <text x="296" y="245" font-size="14" fill="#1f6feb" font-weight="600">A</text>
  <line x1="110" y1="240" x2="158" y2="118" stroke="#8250df" stroke-width="3" marker-end="url(#s-purple)"/>
  <text x="150" y="110" font-size="14" fill="#8250df" font-weight="600">B</text>

  <!-- lerp chord -->
  <line x1="290" y1="240" x2="158" y2="118" stroke="#57606a" stroke-width="1.6" stroke-dasharray="6 4"/>

  <!-- slerp point (on arc, t=0.5) and lerp point (on chord, t=0.5) -->
  <circle cx="251" cy="151" r="5" fill="#1a7f37"/>
  <text x="262" y="150" font-size="13" fill="#1a7f37" font-weight="600">slerp(t)</text>
  <circle cx="224" cy="179" r="5" fill="none" stroke="#57606a" stroke-width="2"/>
  <text x="150" y="200" font-size="13" fill="#57606a">lerp(t)</text>
  <line x1="186" y1="192" x2="220" y2="181" stroke="#57606a" stroke-width="1"/>

  <!-- angle theta -->
  <path d="M 158 240 A 48 48 0 0 0 138 200" fill="none" stroke="#57606a" stroke-width="1.3"/>
  <text x="150" y="220" font-size="12" fill="#57606a">&#952;</text>

  <text x="20" y="280" font-size="14" fill="#24292f"><tspan font-weight="600">Slerp(A, B, t)</tspan> moves at a constant angular speed along the arc, so it stays on the sphere; Lerp does not.</text>
</svg>
