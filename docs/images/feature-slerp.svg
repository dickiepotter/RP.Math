<svg xmlns="http://www.w3.org/2000/svg" width="500" height="272" viewBox="0 0 500 272" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="s-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1f6feb"/></marker>
    <marker id="s-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#8250df"/></marker>
  </defs>
  <rect x="0.5" y="0.5" width="499" height="271" rx="12" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="20" y="30" font-size="16" font-weight="600" fill="#24292f">Slerp follows the arc; Lerp cuts the chord</text>

  <!-- equal-radius arc from B's tip to A's tip (centre = origin, radius 170) -->
  <path d="M 280 240 A 170 170 0 0 0 182 86" fill="none" stroke="#1a7f37" stroke-width="2.5"/>

  <!-- A and B vectors, both length 170 so their tips sit on the arc -->
  <line x1="110" y1="240" x2="280" y2="240" stroke="#1f6feb" stroke-width="3" marker-end="url(#s-blue)"/>
  <text x="286" y="245" font-size="14" fill="#1f6feb" font-weight="600">A</text>
  <line x1="110" y1="240" x2="182" y2="86" stroke="#8250df" stroke-width="3" marker-end="url(#s-purple)"/>
  <text x="172" y="78" font-size="14" fill="#8250df" font-weight="600">B</text>

  <!-- lerp chord between the tips -->
  <line x1="280" y1="240" x2="182" y2="86" stroke="#57606a" stroke-width="1.6" stroke-dasharray="6 4"/>

  <!-- slerp point on the arc (t = 0.5) -->
  <circle cx="253" cy="149" r="5" fill="#1a7f37"/>
  <text x="264" y="148" font-size="13" fill="#1a7f37" font-weight="600">slerp(t)</text>

  <!-- lerp point on the chord (t = 0.5) -->
  <circle cx="231" cy="163" r="5" fill="none" stroke="#57606a" stroke-width="2"/>
  <line x1="175" y1="185" x2="225" y2="166" stroke="#57606a" stroke-width="1"/>
  <text x="138" y="195" font-size="13" fill="#57606a">lerp(t)</text>

  <!-- angle theta between the A and B lines, at the origin -->
  <path d="M 156 240 A 46 46 0 0 0 129 198" fill="none" stroke="#57606a" stroke-width="1.3"/>
  <text x="150" y="218" font-size="12" fill="#57606a">&#952;</text>

  <!-- origin -->
  <circle cx="110" cy="240" r="3.5" fill="#24292f"/>
  <text x="86" y="258" font-size="12" fill="#24292f">origin</text>

</svg>
