<svg xmlns="http://www.w3.org/2000/svg" width="500" height="300" viewBox="0 0 500 300" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="r-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1f6feb"/></marker>
    <marker id="r-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1a7f37"/></marker>
    <marker id="r-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#bf8700"/></marker>
  </defs>
  <rect x="0.5" y="0.5" width="499" height="299" rx="12" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="20" y="30" font-size="16" font-weight="600" fill="#24292f">Reflect a vector about a surface normal</text>

  <!-- surface -->
  <line x1="60" y1="210" x2="440" y2="210" stroke="#57606a" stroke-width="2"/>
  <g stroke="#57606a" stroke-width="1">
    <line x1="70" y1="210" x2="60" y2="222"/><line x1="100" y1="210" x2="90" y2="222"/>
    <line x1="130" y1="210" x2="120" y2="222"/><line x1="160" y1="210" x2="150" y2="222"/>
    <line x1="190" y1="210" x2="180" y2="222"/><line x1="220" y1="210" x2="210" y2="222"/>
    <line x1="250" y1="210" x2="240" y2="222"/><line x1="280" y1="210" x2="270" y2="222"/>
    <line x1="310" y1="210" x2="300" y2="222"/><line x1="340" y1="210" x2="330" y2="222"/>
    <line x1="370" y1="210" x2="360" y2="222"/><line x1="400" y1="210" x2="390" y2="222"/>
  </g>
  <text x="380" y="232" font-size="12" fill="#57606a">surface</text>

  <!-- normal -->
  <line x1="250" y1="210" x2="250" y2="95" stroke="#bf8700" stroke-width="2.5" stroke-dasharray="2 0" marker-end="url(#r-amber)"/>
  <text x="258" y="100" font-size="14" fill="#bf8700" font-weight="600">n&#770; (normal)</text>

  <!-- incident vector v into the point -->
  <line x1="140" y1="95" x2="250" y2="210" stroke="#1f6feb" stroke-width="3" marker-end="url(#r-blue)"/>
  <text x="120" y="90" font-size="14" fill="#1f6feb" font-weight="600">v (incident)</text>

  <!-- reflected vector r -->
  <line x1="250" y1="210" x2="360" y2="95" stroke="#1a7f37" stroke-width="3" marker-end="url(#r-green)"/>
  <text x="318" y="90" font-size="14" fill="#1a7f37" font-weight="600">r (reflected)</text>

  <!-- equal-angle arcs -->
  <path d="M 220 175 A 42 42 0 0 1 250 168" fill="none" stroke="#57606a" stroke-width="1.3"/>
  <path d="M 250 168 A 42 42 0 0 1 280 175" fill="none" stroke="#57606a" stroke-width="1.3"/>
  <text x="212" y="160" font-size="12" fill="#57606a">&#952;</text>
  <text x="280" y="160" font-size="12" fill="#57606a">&#952;</text>

  <text x="20" y="278" font-size="13" fill="#24292f"><tspan font-weight="600">r = v &#8722; 2 (v &#183; n&#770;) n&#770;</tspan>   (angle in = angle out)</text>
</svg>
