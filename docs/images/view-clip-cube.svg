<svg xmlns="http://www.w3.org/2000/svg" width="560" height="300" viewBox="0 0 560 300" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="cc-x" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1f6feb"/></marker>
    <marker id="cc-y" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1a7f37"/></marker>
    <marker id="cc-z" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#bf8700"/></marker>
  </defs>
  <rect x="0.5" y="0.5" width="559" height="299" rx="12" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="20" y="30" font-size="16" font-weight="600" fill="#24292f">The clip cube — what every projection maps onto</text>
  <text x="20" y="50" font-size="12" fill="#57606a">Every visible point lands inside: x, y and z each between −1 and +1.</text>

  <!-- back face and connectors -->
  <path d="M250,90 L400,90 L400,225 L250,225 Z" fill="none" stroke="#8c959f" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="175" y1="125" x2="250" y2="90" stroke="#8c959f" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="325" y1="125" x2="400" y2="90" stroke="#8c959f" stroke-width="1.2"/>
  <line x1="325" y1="260" x2="400" y2="225" stroke="#8c959f" stroke-width="1.2"/>
  <line x1="175" y1="260" x2="250" y2="225" stroke="#8c959f" stroke-width="1.2" stroke-dasharray="4 3"/>

  <!-- front face -->
  <path d="M175,125 L325,125 L325,260 L175,260 Z" fill="#1f6feb" fill-opacity="0.06" stroke="#57606a" stroke-width="1.6"/>

  <!-- corner dots and labels -->
  <circle cx="175" cy="260" r="4" fill="#24292f"/>
  <text x="170" y="278" font-size="12" fill="#24292f" text-anchor="end">(−1, −1, −1)</text>
  <circle cx="400" cy="90" r="4" fill="#24292f"/>
  <text x="408" y="86" font-size="12" fill="#24292f">(+1, +1, +1)</text>

  <!-- axes from the (−1,−1,−1) corner -->
  <line x1="175" y1="260" x2="320" y2="260" stroke="#1f6feb" stroke-width="2.2" marker-end="url(#cc-x)"/>
  <text x="326" y="264" font-size="12" fill="#1f6feb" font-weight="600">x → screen right</text>
  <line x1="175" y1="260" x2="175" y2="120" stroke="#1a7f37" stroke-width="2.2" marker-end="url(#cc-y)"/>
  <text x="168" y="118" font-size="12" fill="#1a7f37" font-weight="600" text-anchor="end">y → screen up</text>
  <line x1="175" y1="260" x2="233" y2="222" stroke="#bf8700" stroke-width="2.2" marker-end="url(#cc-z)"/>
  <text x="196" y="238" font-size="12" fill="#bf8700" font-weight="600">z → depth</text>
  <text x="408" y="250" font-size="12" fill="#57606a">x, y → where on screen</text>
  <text x="408" y="268" font-size="12" fill="#57606a">z → near −1 … far +1</text>
</svg>
